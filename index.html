<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Монитор группы | Статусы команды</title>
    <!-- Bootstrap 5 + Icons + Fonts (для аккуратного модального окна и стилей) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 (иконки кофе, игры и т.д.) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts для чистоты -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f7fc;
            font-family: 'Inter', sans-serif;
            padding: 24px 20px 40px 20px;
        }

        /* главная карточка приложения */
        .app-container {
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* профиль пользователя (шапка с аватаром) */
        .profile-header {
            background: linear-gradient(135deg, #1e2b3c 0%, #0f1a24 100%);
            padding: 24px 24px 20px 24px;
            color: white;
        }

        .profile-badge {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .user-greeting h3 {
            font-size: 1.25rem;
            font-weight: 500;
            margin: 0;
            opacity: 0.85;
        }

        .user-greeting h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 4px 0 0 0;
            letter-spacing: -0.3px;
        }

        .avatar-icon {
            background: #2c4c6c;
            border-radius: 60px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,240,0.3);
        }

        /* панель статусов - быстрые кнопки */
        .status-actions {
            background: #ffffff;
            padding: 18px 24px;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .status-btn {
            background: #f0f3f8;
            border: none;
            border-radius: 60px;
            padding: 8px 20px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            color: #1f2e3a;
        }

        .status-btn i {
            font-size: 1rem;
        }

        .status-btn:hover {
            transform: translateY(-2px);
            background: #e6edf4;
        }

        /* активная кнопка (подсветка выбранного статуса) */
        .status-btn.active-status {
            background: #1e2b3c;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* монитор группы */
        .monitor-section {
            padding: 20px 24px 30px 24px;
        }

        .section-title {
            font-weight: 700;
            font-size: 1.35rem;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #1a2c3b;
            border-left: 5px solid #3f8db3;
            padding-left: 14px;
        }

        .group-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* карточка участника */
        .user-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 14px 18px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef2f8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .user-card:hover {
            border-color: #cbdde9;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .user-avatar-mini {
            width: 44px;
            height: 44px;
            background: #eef2fa;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #2e5a7a;
        }

        .user-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #1a2c3b;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
            background: #f0f3f8;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.3px;
            color: #1f2e3a;
        }

        /* пагинация + индикатор автообновления */
        .pagination-footer {
            margin-top: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            background: #f9fbfd;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            color: #2f5e7e;
            border: 1px solid #e3ebf2;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #34c759;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        .page-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .page-btn {
            background: white;
            border: 1px solid #cddfea;
            border-radius: 30px;
            padding: 5px 12px;
            font-weight: 500;
            transition: 0.1s;
        }

        .page-btn:hover {
            background: #eef3fc;
        }

        /* модальные стили (коррекция, удаление) */
        .modal-content {
            border-radius: 28px;
            border: none;
        }

        .modal-footer button {
            border-radius: 40px;
        }

        footer small {
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Мой профиль (шапка) -->
    <div class="profile-header">
        <div class="profile-badge">
            <div class="user-greeting">
                <h3><i class="fas fa-user-astronaut"></i> Мой профиль</h3>
                <h2>Almas</h2>
            </div>
            <div class="avatar-icon">
                <i class="fas fa-mug-hot"></i>
            </div>
        </div>
        <div style="font-size: 0.8rem; margin-top: 12px; opacity:0.7;">
            <i class="fas fa-id-card"></i> ID: 4bc5694e...9122
        </div>
    </div>

    <!-- Быстрые кнопки статуса: [Учесь] [Кофе] [В игре] [Дома] -->
    <div class="status-actions" id="statusButtonsBar">
        <button class="status-btn" data-status="Учеба" data-color="#3a6ea5"><i class="fas fa-graduation-cap"></i> Учеба</button>
        <button class="status-btn" data-status="Кофе" data-color="#b87333"><i class="fas fa-mug-hot"></i> Кофе</button>
        <button class="status-btn" data-status="В игре" data-color="#5f4b8b"><i class="fas fa-gamepad"></i> В игре</button>
        <button class="status-btn" data-status="Дома" data-color="#2c8c6e"><i class="fas fa-home"></i> Дома</button>
    </div>

    <!-- Монитор группы -->
    <div class="monitor-section">
        <div class="section-title">
            <i class="fas fa-users-viewfinder"></i> Монитор группы
        </div>
        <div id="groupListContainer" class="group-list">
            <!-- Динамически подгружаемые пользователи -->
            <div class="text-muted text-center py-4">Загрузка участников...</div>
        </div>

        <!-- Пагинация: Страница 4 из 5 (демо-стиль, будет динамическая) + живое обновление -->
        <div class="pagination-footer">
            <div class="live-indicator">
                <span class="live-dot"></span>
                <span>Автообновление 5с</span>
            </div>
            <div class="page-controls" id="paginationControls">
                <button class="page-btn" id="prevPageBtn" disabled>← Назад</button>
                <span id="pageIndicator"><strong>Страница 1</strong> из 1</span>
                <button class="page-btn" id="nextPageBtn">Вперед →</button>
            </div>
        </div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО (коррекция / удаление) по аналогии с описанием: [Удалить] [Коррекция] -->
<div class="modal fade" id="actionModal" tabindex="-1" aria-labelledby="actionModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pt-4 px-4">
                <h5 class="modal-title" id="actionModalLabel"><i class="fas fa-user-cog"></i> Действие над участником</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body px-4 pb-2">
                <p id="modalUserName" class="fw-bold fs-5">Almas</p>
                <p>Выберите операцию:</p>
            </div>
            <div class="modal-footer border-0 pb-4 px-4 d-flex justify-content-between">
                <button type="button" class="btn btn-outline-danger rounded-pill px-4" id="modalDeleteBtn"><i class="fas fa-trash-alt"></i> Удалить</button>
                <button type="button" class="btn btn-outline-secondary rounded-pill px-4" id="modalEditBtn"><i class="fas fa-edit"></i> Коррекция</button>
                <button type="button" class="btn btn-secondary rounded-pill px-3" data-bs-dismiss="modal">Отмена</button>
            </div>
        </div>
    </div>
</div>
